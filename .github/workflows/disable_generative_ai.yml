name: Update Notebooks with Colab Metadata

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-notebooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add Colab metadata
        run: python .github/scripts/add_colab_metadata.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: update-notebooks
          title: Add Colab metadata to notebooks
          body: This PR updates notebooks with Colab metadata.
          commit-message: Add Colab metadata
